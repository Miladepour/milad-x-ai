name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Use npm install (like Vercel). npm ci is stricter and fails on Linux
        # when the lockfile was generated on macOS with optional platform deps.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholders so Next.js can compile; not used for real deploy secrets.
          NEXT_PUBLIC_SITE_URL: https://www.mxaiacademy.com
          ADMIN_PATH_SEGMENT: ci-admin-path
